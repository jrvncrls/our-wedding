<div
  class="entry"
  [class.entry--leaving]="isLeaving()"
  [class.entry--locked]="!canEnter"
  (click)="enter()"
  role="button"
  tabindex="0"
  aria-label="Tap to enter"
  (keydown.enter)="enter()"
>
  <div class="entry__bg" aria-hidden="true">
    <video class="entry__video" autoplay muted loop playsinline preload="auto">
      <source src="background.mp4" type="video/mp4" />
    </video>
    <div class="entry__overlay"></div>
  </div>

  <div class="entry__content">
    <p class="entry__label">You are cordially invited to the wedding of</p>

    <h1 class="entry__names">
      <span class="entry__names-first">Jervin</span>
      <span class="entry__names-amp">&amp;</span>
      <span class="entry__names-last">Jarmaine</span>
    </h1>

    <div class="entry__divider" aria-hidden="true"></div>

    <p class="entry__date">December 22, 2026</p>

    @if (canEnter) {
      <div class="entry__cta" aria-hidden="true">
        <span class="entry__cta-ring"></span>
        <span class="entry__cta-icon">♡</span>
      </div>

      <p class="entry__hint">tap anywhere to enter</p>
    } @else {
      <p class="entry__invalid">
        Link is invalid. Kindly click on the invitation link we sent you to continue.
      </p>
    }
  </div>
</div>

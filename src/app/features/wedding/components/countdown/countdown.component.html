<section class="countdown section section--cream" id="countdown" aria-label="Countdown to wedding">
  <div class="container">
    <div class="countdown__header">
      <h2>Countdown</h2>
    </div>

    <div class="countdown-container">
      <div class="timer" aria-live="polite" aria-atomic="true">
        <div class="time-unit">
          <span class="number">{{ pad(countdown().days) }}</span>
          <span class="label">Days</span>
        </div>
        <div class="time-unit">
          <span class="number">{{ pad(countdown().hours) }}</span>
          <span class="label">Hours</span>
        </div>
        <div class="time-unit">
          <span class="number">{{ pad(countdown().minutes) }}</span>
          <span class="label">Minutes</span>
        </div>
        <div class="time-unit">
          <span class="number">{{ pad(countdown().seconds) }}</span>
          <span class="label">Seconds</span>
        </div>
      </div>
    </div>
  </div>
</section>

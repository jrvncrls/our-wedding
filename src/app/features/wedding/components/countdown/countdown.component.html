<section class="countdown section section--cream" id="countdown" aria-label="Countdown to wedding">
  <div class="container">

    <div class="countdown__header">
      <span class="eyebrow">Counting down</span>
      <h2 class="countdown__title">The Big Day Is Almost Here</h2>
      <p class="countdown__subtitle">Join us as we celebrate our love on</p>
      <p class="countdown__date">December 22, 2026</p>
    </div>

    <div class="countdown__grid" aria-live="polite" aria-atomic="true">
      <div class="countdown__unit">
        <div class="countdown__card">
          <span class="countdown__number">{{ pad(countdown().days) }}</span>
        </div>
        <span class="countdown__label">Days</span>
      </div>

      <span class="countdown__separator" aria-hidden="true">:</span>

      <div class="countdown__unit">
        <div class="countdown__card">
          <span class="countdown__number">{{ pad(countdown().hours) }}</span>
        </div>
        <span class="countdown__label">Hours</span>
      </div>

      <span class="countdown__separator" aria-hidden="true">:</span>

      <div class="countdown__unit">
        <div class="countdown__card">
          <span class="countdown__number">{{ pad(countdown().minutes) }}</span>
        </div>
        <span class="countdown__label">Minutes</span>
      </div>

      <span class="countdown__separator" aria-hidden="true">:</span>

      <div class="countdown__unit">
        <div class="countdown__card">
          <span class="countdown__number">{{ pad(countdown().seconds) }}</span>
        </div>
        <span class="countdown__label">Seconds</span>
      </div>
    </div>

    <div class="countdown__ornament" aria-hidden="true">
      <span class="countdown__ornament-line"></span>
      <i class="uil uil-heart"></i>
      <span class="countdown__ornament-line"></span>
    </div>

  </div>
</section>

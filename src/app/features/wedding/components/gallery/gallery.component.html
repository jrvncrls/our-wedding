<section class="gallery" id="gallery" aria-label="Photo gallery">
  <div class="gallery__carousel" role="region" aria-label="Photo carousel">
    <div class="gallery__slides" aria-live="polite">
      @for (image of images; track image.src; let i = $index) {
        <div
          class="gallery__slide"
          [class.gallery__slide--active]="i === currentIndex()"
          [attr.aria-hidden]="i !== currentIndex()"
          role="img"
          [attr.aria-label]="image.alt"
        >
          <div class="gallery__image-wrapper" [style.background-image]="'url(' + image.src + ')'">
            <!-- <div class="gallery__placeholder" aria-hidden="true">
              <i class="uil uil-image"></i>
              <span>Add your photo here</span>
            </div> -->
          </div>

          @if (image.caption) {
            <p class="gallery__caption">{{ image.caption }}</p>
          }
        </div>
      }
    </div>

    <button
      class="gallery__control gallery__control--prev"
      (click)="prev()"
      aria-label="Previous photo"
    >
      <i class="uil uil-angle-left"></i>
    </button>
    <button
      class="gallery__control gallery__control--next"
      (click)="next()"
      aria-label="Next photo"
    >
      <i class="uil uil-angle-right"></i>
    </button>
  </div>
</section>

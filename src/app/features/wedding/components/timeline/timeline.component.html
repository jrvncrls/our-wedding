<section class="timeline section" id="timeline" aria-label="Wedding day timeline">
  <div class="container">
    <div class="timeline__header">
      <span class="eyebrow">The Schedule</span>
      <h2 class="timeline__title">Our Wedding Day</h2>
      <span class="section-rule"></span>
    </div>

    <ol class="timeline__list">
      @for (event of events; track event.time) {
        <li class="timeline__item">
          <!-- Left: image -->
          <div class="timeline__image-col">
            @if (event.image) {
              <img class="timeline__image" [src]="event.image" [alt]="event.title" />
            } @else {
              <div class="timeline__image-placeholder" aria-hidden="true">
                <i class="uil uil-image"></i>
              </div>
            }
          </div>

          <!-- Center divider -->
          <div class="timeline__divider" aria-hidden="true">
            <span class="timeline__divider-circle"></span>
          </div>

          <!-- Right: time + description -->
          <div class="timeline__content">
            <span class="timeline__time">{{ event.time }}</span>
            <h3 class="timeline__event-title">{{ event.title }}</h3>
            <p class="timeline__description">{{ event.description }}</p>
          </div>
        </li>
      }
    </ol>

    <p class="timeline__note">Kindly note that timings are approximate and subject to slight changes on the day.</p>
  </div>
</section>
